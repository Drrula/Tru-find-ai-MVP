# Alembic configuration.
#
# Per docs/phase-b-plan.md §4. Run from `backend/` directory:
#   cd backend && alembic upgrade head
#
# `sqlalchemy.url` below is a placeholder — alembic/env.py overrides it
# at runtime with `Settings.database_url` so the URL discipline (dev
# default in dev; required in staging/production) is the single source
# of truth and matches the runtime engine.

[alembic]
script_location = alembic

# Filename = revision string (no extra slug suffix). Combined with the
# convention of always using `--rev-id NNNN_slug` when creating
# revisions, this yields filenames like `0001_baseline.py`,
# `0002_account.py`, etc. Per docs/phase-b-plan.md §4 naming rules.
file_template = %%(rev)s

# Make `app.*` importable when alembic runs from `backend/`.
prepend_sys_path = .

version_path_separator = os
output_encoding = utf-8

# Placeholder — overridden by env.py from Settings.database_url at runtime.
sqlalchemy.url = postgresql+asyncpg://placeholder

# --- Logging ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
