name: CI

# Per ADR-026 (branch-driven staging, tag-driven prod). The deploy
# workflows (deploy-staging.yml, deploy-production.yml) land in A.11
# alongside Railway service provisioning.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push comes in.
# Standard GitHub Actions pattern; saves runner minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend with dev extras
        run: pip install -e "backend[dev]"

      - name: Run pytest
        run: pytest backend/tests -v

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Verify production build
        run: npm run build
